name: export-zotero

on:
  schedule:
    - cron: "13,43 * * * *"
  workflow_dispatch:

concurrency:
  group: export-zotero
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NOTION_API_VERSION: "2022-06-28"
      NOTION_PAPERS_DATABASE_ID: ${{ secrets.NOTION_PAPERS_DATABASE_ID }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      ZOTERO_API_VERSION: "3"
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      ZOTERO_LIBRARY_ID: ${{ secrets.ZOTERO_LIBRARY_ID }}
      ZOTERO_LIBRARY_TYPE: ${{ secrets.ZOTERO_LIBRARY_TYPE || 'users' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout automation-state workspace
        uses: actions/checkout@v4
        with:
          path: automation-state
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare automation-state branch
        run: |
          git -C automation-state fetch origin automation-state || true
          if git -C automation-state show-ref --verify --quiet refs/remotes/origin/automation-state; then
            git -C automation-state checkout -B automation-state refs/remotes/origin/automation-state
          else
            git -C automation-state checkout --orphan automation-state
            git -C automation-state rm -rf . || true
          fi

      - name: Bootstrap automation-state layout
        run: python scripts/bootstrap_automation_state.py --root automation-state

      - name: Export pending favorites to Zotero
        run: python scripts/export_to_zotero.py --apply --limit 100 --registry-path automation-state/state/registry.json

      - name: Snapshot local export registry
        run: cp automation-state/state/registry.json .local-export-registry.json

      - name: Publish export namespace to automation-state
        run: |
          git -C automation-state config user.name "github-actions[bot]"
          git -C automation-state config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git -C automation-state fetch origin automation-state || true
            if git -C automation-state show-ref --verify --quiet refs/remotes/origin/automation-state; then
              git -C automation-state checkout -B automation-state refs/remotes/origin/automation-state
            else
              git -C automation-state checkout --orphan automation-state
              git -C automation-state rm -rf . || true
            fi
            python scripts/bootstrap_automation_state.py --root automation-state
            if git -C automation-state show-ref --verify --quiet refs/remotes/origin/automation-state; then
              git -C automation-state show refs/remotes/origin/automation-state:state/registry.json > automation-state/.remote-registry.json || cp automation-state/state/registry.json automation-state/.remote-registry.json
            else
              cp automation-state/state/registry.json automation-state/.remote-registry.json
            fi
            python scripts/merge_state_registry.py --remote automation-state/.remote-registry.json --local .local-export-registry.json --namespace export --output automation-state/state/registry.json
            git -C automation-state add state/registry.json state/legacy_unresolved.json state/legacy_unresolved.csv
            git -C automation-state commit -m "chore: refresh export automation-state registry" || echo "No state changes to commit"
            if git -C automation-state push origin automation-state; then
              exit 0
            fi
          done
          echo "Failed to publish automation-state after 3 attempts"
          exit 1
