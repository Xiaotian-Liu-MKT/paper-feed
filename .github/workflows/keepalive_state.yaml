name: keepalive-state

on:
  schedule:
    - cron: "17 6 3 * *"
  workflow_dispatch:

concurrency:
  group: keepalive-state
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout automation-state workspace
        uses: actions/checkout@v4
        with:
          path: automation-state
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare automation-state branch
        run: |
          git -C automation-state fetch origin automation-state || true
          if git -C automation-state show-ref --verify --quiet refs/remotes/origin/automation-state; then
            git -C automation-state checkout -B automation-state refs/remotes/origin/automation-state
          else
            git -C automation-state checkout --orphan automation-state
            git -C automation-state rm -rf . || true
          fi

      - name: Update heartbeat
        run: python scripts/touch_heartbeat.py --root automation-state --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --workflow keepalive-state

      - name: Commit heartbeat
        run: |
          git -C automation-state config user.name "github-actions[bot]"
          git -C automation-state config user.email "github-actions[bot]@users.noreply.github.com"
          git -C automation-state add state/heartbeat.json
          git -C automation-state commit -m "chore: keep automation-state alive" || echo "No state changes to commit"
          git -C automation-state push origin automation-state
